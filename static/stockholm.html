<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Båtklubbar i Stockholm</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a3a5c;
      --navy-dk: #122840;
      --water:   #2a6496;
      --sand:    #f5f0e8;
      --rope:    #c8a96e;
      --rope-dk: #9e7d47;
      --wood:    #8b6914;
      --text:    #1e2d3d;
      --muted:   #6b7c8d;
      --white:   #ffffff;
      --red:     #b33030;
      --green:   #2e6b47;
    }

    html, body { height: 100%; font-family: Georgia, 'Times New Roman', serif; background: var(--sand); color: var(--text); overflow: hidden; }

    #app { display: flex; height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────── */
    #sidebar {
      width: 270px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      background: var(--navy-dk);
      border-right: 3px solid var(--rope-dk);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Header */
    #sidebar-header {
      background: var(--navy);
      padding: 16px 16px 12px;
      border-bottom: 2px solid var(--rope-dk);
    }

    .site-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .site-title .anchor { font-size: 28px; line-height: 1; }
    .site-title h1 { font-size: 15px; font-weight: normal; color: var(--sand); letter-spacing: 0.03em; line-height: 1.3; }
    .site-title h1 strong { font-size: 15px; color: var(--rope); }

    /* Search */
    .search-wrap { position: relative; }
    #search {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 4px;
      padding: 8px 10px 8px 32px;
      color: var(--sand);
      font-size: 13px;
      font-family: Georgia, serif;
      outline: none;
    }
    #search::placeholder { color: rgba(245,240,232,0.4); }
    #search:focus { border-color: var(--rope); background: rgba(255,255,255,0.1); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--rope); pointer-events: none; }

    /* Filter chips */
    .filters { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .chip {
      padding: 3px 9px;
      border-radius: 3px;
      font-size: 11px;
      font-family: Georgia, serif;
      border: 1px solid rgba(200,169,110,0.25);
      background: transparent;
      color: rgba(245,240,232,0.5);
      cursor: pointer;
      transition: all .15s;
    }
    .chip:hover { color: var(--sand); border-color: var(--rope); }
    .chip.active { background: rgba(200,169,110,0.2); color: var(--rope); border-color: var(--rope-dk); }

    /* Stats */
    #stats-bar {
      display: flex;
      border-bottom: 1px solid rgba(200,169,110,0.2);
      background: rgba(0,0,0,0.2);
    }
    .stat-box { flex: 1; padding: 8px 10px; text-align: center; border-right: 1px solid rgba(200,169,110,0.15); }
    .stat-box:last-child { border-right: none; }
    .stat-box .n { font-size: 19px; color: var(--rope); font-family: Georgia, serif; }
    .stat-box .l { font-size: 10px; color: var(--muted); margin-top: 1px; font-family: Arial, sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }

    /* Club list */
    #club-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--rope-dk) transparent;
    }
    #club-list::-webkit-scrollbar { width: 4px; }
    #club-list::-webkit-scrollbar-thumb { background: var(--rope-dk); border-radius: 2px; }

    #club-list li {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background .12s;
    }
    #club-list li:hover { background: rgba(200,169,110,0.08); }
    #club-list li.active { border-left-color: var(--rope); background: rgba(200,169,110,0.12); }
    #club-list li + li { border-top: 1px solid rgba(255,255,255,0.04); }

    .list-anchor { font-size: 14px; flex-shrink: 0; }
    .club-info { flex: 1; min-width: 0; }
    .club-info .name { font-size: 13px; color: var(--sand); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: Georgia, serif; }
    .club-info .meta { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: Arial, sans-serif; }
    .spots-pill {
      font-size: 11px;
      font-family: Arial, sans-serif;
      background: rgba(200,169,110,0.15);
      color: var(--rope);
      border: 1px solid rgba(200,169,110,0.25);
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #no-results { padding: 24px 16px; color: var(--muted); font-size: 13px; text-align: center; }

    /* ── Map ──────────────────────────────────────────── */
    #map { flex: 1; z-index: 0; }

    /* ── Markers ──────────────────────────────────────── */
    .buoy {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      transition: transform .15s;
    }
    .buoy-sm  { background: #1a6496; }
    .buoy-md  { background: #b37800; }
    .buoy-lg  { background: #8b2020; }
    .buoy:hover { transform: scale(1.25); }
    .buoy.selected { box-shadow: 0 0 0 3px rgba(255,255,255,0.7), 0 2px 10px rgba(0,0,0,0.5); transform: scale(1.2); }

    /* ── Info panel ───────────────────────────────────── */
    #info-panel {
      position: absolute;
      top: 16px; right: 16px;
      width: 280px;
      background: var(--sand);
      border: 2px solid var(--rope-dk);
      border-radius: 4px;
      box-shadow: 4px 4px 16px rgba(0,0,0,0.35);
      z-index: 500;
      transform: translateX(320px);
      opacity: 0;
      transition: transform .22s ease, opacity .18s ease;
    }
    #info-panel.open { transform: translateX(0); opacity: 1; }

    .panel-head {
      background: var(--navy);
      padding: 12px 36px 12px 14px;
      border-bottom: 2px solid var(--rope-dk);
      position: relative;
    }
    .panel-head h2 { font-size: 14px; color: var(--sand); font-weight: normal; line-height: 1.35; }
    .panel-head .district-tag {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--rope);
      background: rgba(200,169,110,0.15);
      padding: 2px 7px;
      border-radius: 2px;
    }
    #panel-close {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: var(--sand); width: 22px; height: 22px;
      border-radius: 50%; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif;
    }
    #panel-close:hover { background: rgba(255,255,255,0.2); }

    .spots-block {
      padding: 10px 14px 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .spots-block .big { font-size: 28px; color: var(--rope-dk); font-family: Georgia, serif; line-height: 1; }
    .spots-block .lbl { font-size: 12px; color: var(--muted); font-family: Arial, sans-serif; }

    #panel-rows { padding: 10px 14px; }
    .info-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(200,169,110,0.2);
      font-size: 12px;
      font-family: Arial, sans-serif;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: var(--muted); min-width: 56px; flex-shrink: 0; font-size: 11px; }
    .info-row .val { color: var(--text); }
    .info-row a { color: var(--water); text-decoration: none; }
    .info-row a:hover { text-decoration: underline; }

    /* Legend */
    .map-legend {
      position: absolute;
      bottom: 28px; left: 14px;
      background: rgba(245,240,232,0.92);
      border: 1px solid rgba(158,125,71,0.4);
      border-radius: 4px;
      padding: 8px 11px;
      z-index: 400;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--text);
    }
    .map-legend .leg-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
    .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .leg-dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }

    .map-credit { display: none; }

    /* Leaflet overrides */
    .leaflet-control-zoom a { background: var(--navy) !important; color: var(--sand) !important; border-color: var(--rope-dk) !important; font-family: Georgia, serif !important; }
    .leaflet-control-zoom a:hover { background: var(--navy-dk) !important; }
    .leaflet-control-attribution { background: rgba(26,40,64,0.8) !important; color: #7a8fa8 !important; font-size: 10px !important; }

    @media (max-width: 640px) {
      #sidebar { width: 100%; height: 220px; }
      #app { flex-direction: column; }
      #info-panel { top: auto; bottom: 10px; right: 8px; left: 8px; width: auto; }
    }
  </style>
</head>

const map = L.map('map', { center: [59.32, 18.06], zoom: 11 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19, subdomains: 'abcd',
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  attribution: '', maxZoom: 19, subdomains: 'abcd', pane: 'shadowPane',
}).addTo(map);

// ── State ────────────────────────────────────────────────────────────────
let filtered = [...CLUBS];
let markers = {};
let activeClub = null;
let activeDistrict = 'all';

function markerColor(spots) {
  if (spots >= 200) return 'buoy-lg';
  if (spots >= 100) return 'buoy-md';
  return 'buoy-sm';
}

function makeIcon(club, selected) {
  const cls = 'buoy ' + markerColor(club.spots || 0) + (selected ? ' selected' : '');
  return L.divIcon({ className: '', html: `<div class="${cls}">⚓</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
}

// ── Rendera markörer ─────────────────────────────────────────────────────
function renderMarkers(clubs) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  clubs.forEach(club => {
    const m = L.marker([club.lat, club.lon], { icon: makeIcon(club, false) }).addTo(map);
    m.on('click', () => select(club));
    markers[club.name] = m;
  });
}

// ── Rendera lista ────────────────────────────────────────────────────────
function renderList(clubs) {
  const ul = document.getElementById('club-list');
  ul.innerHTML = '';
  if (!clubs.length) { ul.innerHTML = '<div id="no-results">Inga klubbar hittades.</div>'; return; }
  clubs.forEach(club => {
    const li = document.createElement('li');
    if (activeClub?.name === club.name) li.classList.add('active');
    li.innerHTML = `<span class="list-anchor">⚓</span>
      <div class="club-info">
        <div class="name">${esc(club.name)}</div>
        <div class="meta">${esc(club.district || '')}${club.address ? ' · ' + esc(club.address.split(',')[0]) : ''}</div>
      </div>
      ${club.spots ? `<span class="spots-pill">${club.spots} pl.</span>` : ''}`;
    li.addEventListener('click', () => select(club));
    ul.appendChild(li);
  });
}

// ── Uppdatera stats ──────────────────────────────────────────────────────
function updateStats(clubs) {
  const spots = clubs.reduce((s, c) => s + (c.spots || 0), 0);
  const dists = new Set(clubs.map(c => c.district).filter(Boolean)).size;
  document.getElementById('s-count').textContent = clubs.length;
  document.getElementById('s-spots').textContent = spots.toLocaleString('sv-SE');
  document.getElementById('s-dist').textContent = dists;
  document.getElementById('badge-n').textContent = clubs.length;
}

// ── Välj klubb ───────────────────────────────────────────────────────────
function select(club) {
  if (activeClub && markers[activeClub.name]) {
    markers[activeClub.name].setIcon(makeIcon(activeClub, false));
  }
  activeClub = club;
  if (markers[club.name]) {
    markers[club.name].setIcon(makeIcon(club, true));
    map.flyTo([club.lat, club.lon], Math.max(map.getZoom(), 13), { duration: 0.7 });
  }
  document.querySelectorAll('#club-list li').forEach((li, i) => {
    li.classList.toggle('active', filtered[i]?.name === club.name);
  });
  openPanel(club);
}

function openPanel(c) {
  document.getElementById('p-name').textContent = c.name;
  document.getElementById('p-district').textContent = c.district || '';

  const sw = document.getElementById('spots-block-wrap');
  sw.innerHTML = c.spots ? `<div class="spots-block"><div class="big">${c.spots}</div><div class="lbl">båtplatser</div></div>` : '';

  let rows = '';
  if (c.address) rows += row('Adress', esc(c.address));
  if (c.phone)   rows += row('Telefon', `<a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>`);
  if (c.email)   rows += row('E-post', `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`);
  if (c.founded) rows += row('Grundad', c.founded);
  if (c.url) {
    const d = c.url.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'');
    rows += row('Webb', `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(d)}</a>`);
  }
  rows += row('Koord.', `${c.lat.toFixed(4)}, ${c.lon.toFixed(4)}`);
  document.getElementById('panel-rows').innerHTML = rows;
  document.getElementById('info-panel').classList.add('open');
}

function row(lbl, val) {
  return `<div class="info-row"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('open');
  if (activeClub && markers[activeClub.name]) markers[activeClub.name].setIcon(makeIcon(activeClub, false));
  activeClub = null;
  document.querySelectorAll('#club-list li').forEach(li => li.classList.remove('active'));
});

// ── Filter + sök ─────────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = CLUBS.filter(c => {
    const okD = activeDistrict === 'all' || c.district === activeDistrict;
    const okQ = !q || c.name.toLowerCase().includes(q) || (c.district||'').toLowerCase().includes(q) || (c.address||'').toLowerCase().includes(q);
    return okD && okQ;
  });
  renderList(filtered);
  renderMarkers(filtered);
  updateStats(filtered);
}

document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeDistrict = chip.dataset.d;
  applyFilter();
});

let t;
document.getElementById('search').addEventListener('input', () => { clearTimeout(t); t = setTimeout(applyFilter, 180); });

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ─────────────────────────────────────────────────────────────────
renderList(CLUBS);
renderMarkers(CLUBS);
updateStats(CLUBS);
</script>
</body>
</html>
