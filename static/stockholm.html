<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Båtklubbar i Stockholm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1b2a;
      --navy2: #152236;
      --panel: #111e2e;
      --border: rgba(255,255,255,0.07);
      --accent: #3b9eff;
      --accent2: #1c7ed6;
      --text: #e8edf3;
      --muted: #7a8fa8;
      --green: #2ecc9a;
      --tag-bg: rgba(59,158,255,0.12);
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--navy); color: var(--text); overflow: hidden; }

    /* ── Layout ──────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; position: relative; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      width: 320px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
      z-index: 10;
      overflow: hidden;
    }

    #sidebar-top {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text h1 { font-size: 14px; font-weight: 600; line-height: 1.2; }
    .logo-text span { font-size: 11px; color: var(--muted); }

    #search {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: rgba(59,158,255,0.4); }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }

    /* Filter chips */
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .chip:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .chip.active { background: var(--tag-bg); color: var(--accent); border-color: rgba(59,158,255,0.3); }

    /* Stats bar */
    #stats-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-box {
      flex: 1;
      padding: 10px 14px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .stat-box:last-child { border-right: none; }
    .stat-box .n { font-size: 18px; font-weight: 600; color: var(--accent); }
    .stat-box .l { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* Club list */
    #club-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    #club-list li {
      padding: 10px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .12s, border-color .12s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #club-list li:hover { background: rgba(255,255,255,0.04); }
    #club-list li.active { border-left-color: var(--accent); background: rgba(59,158,255,0.07); }

    .club-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .club-info { flex: 1; min-width: 0; }
    .club-info .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .club-info .meta { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .spots-badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    #no-results { padding: 30px 20px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── Map ─────────────────────────────────────────────────── */
    #map { flex: 1; z-index: 0; }

    .leaflet-tile { filter: brightness(0.85) saturate(0.7); }

    /* Custom markers */
    .marker-pin {
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--accent);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .marker-pin.large { background: #f59e0b; }
    .marker-pin.xl { background: #ef4444; }
    .marker-pin::after {
      content: '⚓';
      display: block;
      transform: rotate(45deg);
      font-size: 13px;
    }
    .marker-pin:hover { filter: brightness(1.2); }
    .marker-pin.selected {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(46,204,154,0.3);
    }

    /* ── Info panel ──────────────────────────────────────────── */
    #info-panel {
      position: absolute;
      top: 20px; right: 20px;
      width: 300px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      z-index: 500;
      overflow: hidden;
      transform: translateX(340px);
      opacity: 0;
      transition: transform .25s cubic-bezier(.22,1,.36,1), opacity .2s;
    }
    #info-panel.open { transform: translateX(0); opacity: 1; }

    .panel-header {
      background: var(--accent2);
      padding: 16px 18px;
      position: relative;
    }
    .panel-header h2 { font-size: 15px; font-weight: 600; line-height: 1.3; padding-right: 24px; }
    .panel-header .district {
      font-size: 11px;
      margin-top: 4px;
      opacity: 0.8;
    }
    #panel-close {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.2); border: none;
      color: white; width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-close:hover { background: rgba(0,0,0,0.4); }

    .panel-body { padding: 16px 18px; }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .icon { font-size: 15px; width: 20px; flex-shrink: 0; text-align: center; }
    .info-row .label { color: var(--muted); font-size: 11px; display: block; margin-bottom: 1px; }
    .info-row .value { color: var(--text); }
    .info-row a { color: var(--accent); text-decoration: none; }
    .info-row a:hover { text-decoration: underline; }

    .spots-highlight {
      background: rgba(59,158,255,0.1);
      border: 1px solid rgba(59,158,255,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .spots-highlight .big { font-size: 28px; font-weight: 600; color: var(--accent); }
    .spots-highlight .sub { font-size: 12px; color: var(--muted); }

    /* ── Map controls ────────────────────────────────────────── */
    .map-badge {
      position: absolute;
      bottom: 30px; left: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      z-index: 400;
    }
    .map-badge strong { color: var(--text); }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 30px; right: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 400;
      font-size: 11px;
    }
    .legend-title { font-weight: 600; margin-bottom: 8px; color: var(--muted); }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Responsive */
    @media (max-width: 640px) {
      #sidebar { width: 100%; height: 240px; }
      #app { flex-direction: column; }
      #info-panel { top: auto; bottom: 10px; right: 10px; left: 10px; width: auto; }
    }

    /* Leaflet overrides */
    .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--navy2) !important; }
    .leaflet-control-attribution { background: rgba(13,27,42,0.8) !important; color: var(--muted) !important; }
    .leaflet-control-attribution a { color: var(--muted) !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-top">
      <div class="logo">
        <div class="logo-icon">⚓</div>
        <div class="logo-text">
          <h1>Båtklubbar Stockholm</h1>
          <span>Källa: Båtunionen · batklubbar.se</span>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="search" placeholder="Sök klubb eller område..." autocomplete="off" />
      </div>
      <div class="filters" id="filters">
        <button class="chip active" data-district="all">Alla</button>
        <button class="chip" data-district="Kungsholmen">Kungsholmen</button>
        <button class="chip" data-district="Söder">Söder</button>
        <button class="chip" data-district="Djurgården">Djurgården</button>
        <button class="chip" data-district="Östermalm">Östermalm</button>
        <button class="chip" data-district="Essingen">Essingen</button>
        <button class="chip" data-district="Liljeholmen">Liljeholmen</button>
        <button class="chip" data-district="Norra">Norra</button>
        <button class="chip" data-district="Skärgård">Skärgård</button>
      </div>
    </div>

    <div id="stats-bar">
      <div class="stat-box"><div class="n" id="s-count">55</div><div class="l">Klubbar</div></div>
      <div class="stat-box"><div class="n" id="s-spots">—</div><div class="l">Båtplatser</div></div>
      <div class="stat-box"><div class="n" id="s-dist">9</div><div class="l">Distrikt</div></div>
    </div>

    <ul id="club-list"></ul>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Info panel -->
  <div id="info-panel">
    <div class="panel-header">
      <button id="panel-close" aria-label="Stäng">✕</button>
      <h2 id="p-name"></h2>
      <div class="district" id="p-district"></div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- Map badge -->
  <div class="map-badge">Visar <strong id="badge-count">55</strong> båtklubbar</div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">Antal båtplatser</div>
    <div class="legend-row"><div class="legend-dot" style="background:#3b9eff"></div> Under 100</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div> 100–199</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div> 200+</div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Data (inlines from JSON, fetched below) ──────────────────────────────
let allClubs = [];
let filtered = [];
let markers = {};
let activeClub = null;
let activeDistrict = 'all';

// ── Map init ─────────────────────────────────────────────────────────────
const map = L.map('map', { center: [59.33, 18.07], zoom: 11, zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
  subdomains: 'abcd',
}).addTo(map);

// ── Marker factory ───────────────────────────────────────────────────────
function makeIcon(spots, selected = false) {
  let cls = 'marker-pin';
  if (spots >= 200) cls += ' xl';
  else if (spots >= 100) cls += ' large';
  if (selected) cls += ' selected';
  return L.divIcon({ className: '', html: `<div class="${cls}"></div>`, iconSize: [32, 32], iconAnchor: [16, 32] });
}

// ── Load data ────────────────────────────────────────────────────────────
fetch('/api/stockholm')
  .then(r => r.json())
  .then(data => {
    allClubs = data;
    init();
  })
  .catch(() => {
    // fallback: fetch from static file
    fetch('/data/stockholm_clubs.json')
      .then(r => r.json())
      .then(data => { allClubs = data; init(); })
      .catch(e => console.error('Kunde inte ladda data:', e));
  });

function init() {
  updateStats(allClubs);
  applyFilter();
}

// ── Filter & render ──────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = allClubs.filter(c => {
    const matchDist = activeDistrict === 'all' || c.district === activeDistrict;
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.district||'').toLowerCase().includes(q) || (c.address||'').toLowerCase().includes(q);
    return matchDist && matchQ;
  });
  renderList(filtered);
  renderMarkers(filtered);
  document.getElementById('badge-count').textContent = filtered.length;
}

function renderList(clubs) {
  const ul = document.getElementById('club-list');
  ul.innerHTML = '';
  if (!clubs.length) {
    ul.innerHTML = '<div id="no-results">Inga klubbar hittades</div>';
    return;
  }
  clubs.forEach(club => {
    const li = document.createElement('li');
    if (activeClub && activeClub.name === club.name) li.classList.add('active');
    li.innerHTML = `
      <div class="club-dot"></div>
      <div class="club-info">
        <div class="name">${esc(club.name)}</div>
        <div class="meta">${esc(club.district || '')}${club.address ? ' · ' + esc(club.district ? club.address.split(',')[0] : club.address) : ''}</div>
      </div>
      ${club.spots ? `<div class="spots-badge">${club.spots} pl.</div>` : ''}
    `;
    li.addEventListener('click', () => selectClub(club));
    ul.appendChild(li);
  });
}

function renderMarkers(clubs) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  clubs.forEach(club => {
    if (!club.lat || !club.lon) return;
    const m = L.marker([club.lat, club.lon], { icon: makeIcon(club.spots || 0) }).addTo(map);
    m.on('click', () => selectClub(club));
    markers[club.name] = m;
  });
}

// ── Select club ──────────────────────────────────────────────────────────
function selectClub(club) {
  // Update previous active marker
  if (activeClub && markers[activeClub.name]) {
    markers[activeClub.name].setIcon(makeIcon(activeClub.spots || 0));
  }
  activeClub = club;

  // Update new active marker
  if (markers[club.name]) {
    markers[club.name].setIcon(makeIcon(club.spots || 0, true));
    map.flyTo([club.lat, club.lon], Math.max(map.getZoom(), 13), { duration: 0.8 });
  }

  // Update list highlight
  document.querySelectorAll('#club-list li').forEach((li, i) => {
    li.classList.toggle('active', filtered[i]?.name === club.name);
  });

  showPanel(club);
}

function showPanel(club) {
  document.getElementById('p-name').textContent = club.name;
  document.getElementById('p-district').textContent = club.district || '';

  let rows = '';

  if (club.spots) {
    rows += `
      <div class="spots-highlight">
        <div class="big">${club.spots}</div>
        <div><div class="sub">Båtplatser</div></div>
      </div>`;
  }

  if (club.address) {
    rows += row('📍', 'Adress', esc(club.address));
  }
  if (club.district) {
    rows += row('🗺️', 'Område', esc(club.district));
  }
  if (club.phone) {
    rows += row('📞', 'Telefon', `<a href="tel:${esc(club.phone)}">${esc(club.phone)}</a>`);
  }
  if (club.email) {
    rows += row('✉️', 'E-post', `<a href="mailto:${esc(club.email)}">${esc(club.email)}</a>`);
  }
  if (club.founded) {
    rows += row('📅', 'Grundad', club.founded);
  }
  if (club.url) {
    const display = club.url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
    rows += row('🌐', 'Hemsida', `<a href="${esc(club.url)}" target="_blank" rel="noopener">${esc(display)}</a>`);
  }
  rows += row('📌', 'Koordinater', `${club.lat.toFixed(4)}, ${club.lon.toFixed(4)}`);

  document.getElementById('panel-body').innerHTML = rows;
  document.getElementById('info-panel').classList.add('open');
}

function row(icon, label, value) {
  return `<div class="info-row"><div class="icon">${icon}</div><div><span class="label">${label}</span><span class="value">${value}</span></div></div>`;
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('open');
  if (activeClub && markers[activeClub.name]) {
    markers[activeClub.name].setIcon(makeIcon(activeClub.spots || 0));
  }
  activeClub = null;
  document.querySelectorAll('#club-list li').forEach(li => li.classList.remove('active'));
});

// ── Stats ────────────────────────────────────────────────────────────────
function updateStats(clubs) {
  const totalSpots = clubs.reduce((s, c) => s + (c.spots || 0), 0);
  const districts = new Set(clubs.map(c => c.district).filter(Boolean));
  document.getElementById('s-count').textContent = clubs.length;
  document.getElementById('s-spots').textContent = totalSpots.toLocaleString('sv-SE');
  document.getElementById('s-dist').textContent = districts.size;
}

// ── Filters ──────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeDistrict = chip.dataset.district;
  applyFilter();
  updateStats(filtered);
});

let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { applyFilter(); updateStats(filtered); }, 180);
});

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
